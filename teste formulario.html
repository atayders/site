<!DOCTYPE html>
<html lang="pr-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidato</title>
</head>

<body>
    <header>
        <h2>Candidate-se</h2>
    </header>

    <section>
        <form action="">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required> <br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required> <br>

            <!-- Opcao 01 para essa parte
           <label for="idade">Idade:</label>
           <input type="idade" id="idade" name="idade" required> <br>> -->

            <label for="idade">Idade:</label>
            <select name="idade" id="idade">
                <option value="20">20</option>
                <option value="21">21</option>
                <option value="22">22</option>
                <option value="23">23</option>
                <option value="24">24</option>
                <option value="25">25</option>
                <option value="26">26</option>
                <option value="27">27</option>
                <option value="28">28</option>
                <option value="29">29</option>
                <option value="30">30</option>
                <option value="31">31</option>
                <option value="32">32</option>
                <option value="33">33</option>
                <option value="34">34</option>
                <option value="35">35</option>
                <option value="36">36</option>
                <option value="37">37</option>
                <option value="38">38</option>
                <option value="39">39</option>
                <option value="40">40</option>
                <option value="...">...</option>              
            </select><br>

            <label for="materia">Qual matéria deseja se candidatar?</label>
            <select name="materia" id="materia">
                <option value="matematica">Matémarica</option>
                <option value="portugues">Português</option>
                <option value="biologia">Biologia</option>
                <option value="ciencias">Ciências</option>
                <option value="historia">História</option>
                <option value="geografia">Geografia</option>
                <option value="artes">Arte</option>
            </select><br>

            <label for="escolaridade">Nivel de escolaridade?</label>
            <select name="escolaridade" id="escolaridade">
                <option value="ensino superios completo">Ensino superios completo</option>
                <option value="cursando pos-graduacao">Cursando Pós-graduação</option>
                <option value="pos-graduacao completa">Pós-graduação completa</option>
                <option value="cursando mestrado">Cursando Mestrado</option>
                <option value="mestrado completo">Mestrado completo</option>
                <option value="cursando doutorado">Cursando doutorado</option>
                <option value="doutorado completo">Doutorado completo</option>
            </select><br>

            <label for="descricao sobre si">Descrição sobre si:</label>
            <textarea name="descricao" id="descricao" cols="30" rows="5" required></textarea> <br>

            <input type="submit" value="Enviar mensagem">
        </form>

    </section>
</body>

</html>
